{% extends 'marketplace/base.html' %}

{% block content %}
<h2>{{ title }}</h2>
<form method="post" novalidate>
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Save</button>
    <a href="{% url 'marketplace:dashboard' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
